name: CI

# Runs on every pull request: a TypeScript typecheck plus a Playwright smoke
# test that exercises the core sign-in / join / create-trip flows against the
# built app with a fully-stubbed Supabase (no live project, no network).
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - run: npm run build
      - name: Serve the built app and run the smoke test
        run: |
          npm run preview -- --port 4173 --strictPort > preview.log 2>&1 &
          PREVIEW_PID=$!
          for i in $(seq 1 60); do
            curl -sf http://localhost:4173/ >/dev/null && break
            sleep 1
          done
          npm test
          STATUS=$?
          kill "$PREVIEW_PID" 2>/dev/null || true
          exit $STATUS
        env:
          BASE_URL: http://localhost:4173
